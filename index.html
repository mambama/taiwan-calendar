<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#534AB7"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="台灣行事曆"/>
<title>台灣農民曆行事曆</title>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png"/>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<style>
:root{--bg:#fff;--bg2:#f0f0f2;--tx:#0d1117;--tx2:#555e6b;--tx3:#9ca3af;--bd:#d1d5db;--bd2:#e9eaec;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:15px}
.app{max-width:460px;margin:0 auto;padding:10px 12px 40px}

/* ── 頂部 ── */
.top-bar{display:flex;align-items:center;gap:6px;padding:8px 0 12px}
.nav-btn{background:none;border:1.5px solid var(--bd);border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:18px;font-weight:600;flex-shrink:0}
.nav-btn:active{background:var(--bg2)}
.month-title{font-size:17px;font-weight:700;min-width:100px;text-align:center;flex-shrink:0}
.spacer{flex:1}
.top-btn{font-size:13px;font-weight:600;padding:8px 14px;border:1.5px solid var(--bd);border-radius:22px;background:none;color:var(--tx2);cursor:pointer;white-space:nowrap;flex-shrink:0;min-height:38px}
.top-btn:active{background:var(--bg2)}
.top-btn.active{border-color:#534AB7;color:#534AB7;background:#EEEDFE}
.top-btn.list-active{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}

/* ── 查詢 popup ── */
.jump-popup{background:var(--bg);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.jump-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.jump-year-input{width:80px;font-size:14px;font-weight:600;padding:8px 10px;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg2);color:var(--tx);outline:none;text-align:center}
.jump-year-input:focus{border-color:#534AB7}
.jump-popup select{font-size:14px;padding:8px 10px;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg2);color:var(--tx);outline:none;cursor:pointer}
.jump-go{font-size:13px;font-weight:700;padding:8px 16px;border-radius:10px;cursor:pointer;border:none;background:#534AB7;color:#fff}
.jump-cancel{font-size:13px;padding:8px 14px;border-radius:10px;cursor:pointer;border:1.5px solid var(--bd);background:none;color:var(--tx2)}
.jump-shortcuts{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.jump-shortcuts span{font-size:12px;color:var(--tx3);flex-shrink:0;font-weight:500}
.yr-chip{font-size:12px;font-weight:500;padding:4px 10px;border:1px solid var(--bd);border-radius:20px;cursor:pointer;background:none;color:var(--tx2)}
.yr-chip:active{background:#EEEDFE;border-color:#534AB7;color:#534AB7}

/* ── 工具列 ── */
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.notif-pill{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:22px;border:1.5px solid var(--bd);font-size:13px;font-weight:600;color:var(--tx2);cursor:pointer;background:none;min-height:38px}
.notif-pill.on{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}
.notif-pill.off{border-color:#E24B4A;color:#A32D2D;background:#FCEBEB}
.tb-btn{display:flex;align-items:center;gap:4px;padding:7px 12px;border:1.5px solid var(--bd);border-radius:22px;font-size:13px;font-weight:600;color:var(--tx2);background:none;cursor:pointer;white-space:nowrap;min-height:38px}
.tb-btn:active{background:var(--bg2)}
.tb-btn.sync{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}
.save-toast{font-size:12px;font-weight:600;color:#1D9E75;opacity:0;transition:opacity .3s;margin-left:auto;flex-shrink:0}
.save-toast.show{opacity:1}

/* ── 節日更新結果 modal ── */
.hol-result{background:var(--bg);border:1px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.hol-result-title{font-size:15px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.hol-result-body{font-size:13px;color:var(--tx2);line-height:1.7;margin-bottom:10px}
.hol-result-body b{color:var(--tx);font-weight:700}
.hol-result-close{font-size:13px;font-weight:600;padding:7px 18px;border:none;border-radius:10px;background:#534AB7;color:#fff;cursor:pointer}

/* ── 同步 box ── */
.sync-box{background:var(--bg);border:1px solid #FDE68A;border-radius:14px;padding:14px 16px;margin-bottom:10px;background:#FFFBEB}
.sync-box-title{font-size:14px;font-weight:700;color:#78350F;margin-bottom:6px}
.sync-box-body{font-size:13px;color:#92400E;line-height:1.7;margin-bottom:10px}
.sync-actions{display:flex;gap:8px;flex-wrap:wrap}
.sync-actions button{font-size:13px;font-weight:600;padding:7px 16px;border-radius:10px;cursor:pointer}

/* ── PWA 安裝提示 ── */
#install-banner{display:none;background:#534AB7;color:#fff;padding:12px 14px;border-radius:12px;margin-bottom:10px;font-size:14px;font-weight:600;align-items:center;gap:8px}
#install-banner button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:20px;color:#fff;font-size:13px;font-weight:600;padding:6px 14px;cursor:pointer}

/* ── 行事曆 ── */
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.wd{text-align:center;font-size:12px;font-weight:700;padding:3px 0;color:var(--tx3)}
.wd.sat{color:#378ADD}.wd.sun{color:#E24B4A}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.day{min-height:54px;border-radius:9px;padding:4px 2px 3px;cursor:pointer;display:flex;flex-direction:column;align-items:center;border:1px solid transparent;position:relative}
.day:active:not(.other-month){transform:scale(.93)}
.day.other-month{opacity:.18;cursor:default}
.day.holiday:not(.other-month){background:#FFF0F0}
.day.today{background:none;border-color:transparent}
.day.selected{background:#EEEDFE!important;border-color:#534AB7!important}
.day-num{font-size:17px;font-weight:800;line-height:1;text-align:center;width:100%}
/* 今天：紫色實心圓點 */
.day.today .day-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  background:#534AB7;color:#fff!important;
  font-size:16px;font-weight:800;
}
.day.selected .day-num{color:#3C3489!important}
.day.selected.today .day-num{background:#3C3489;color:#fff!important}
.day.sat:not(.other-month) .day-num{color:#378ADD}
.day.sun:not(.other-month) .day-num{color:#E24B4A}
.day.holiday:not(.other-month) .day-num{color:#A32D2D}
.lunar-txt{font-size:9px;font-weight:500;color:var(--tx3);margin-top:1px;text-align:center;line-height:1.2;width:100%}
.day.holiday:not(.other-month) .lunar-txt{color:#B05050}
.solar-term{font-size:8px;font-weight:700;color:#1D9E75;line-height:1;text-align:center;width:100%}
.hol-name{font-size:7.5px;font-weight:600;color:#A32D2D;line-height:1;margin-top:1px;text-align:center;max-width:100%;overflow:hidden}
/* 事件圓點：日期數字正上方 */
.ev-indicator{width:7px;height:7px;border-radius:50%;background:#F97316;margin:0 auto 2px;flex-shrink:0}
.ev-indicator.holiday-day{background:#F97316}
.ev-indicator.selected-day{background:#F97316}

/* ── Tabs ── */
.tab-bar{display:flex;background:var(--bg2);border-radius:12px;padding:3px;margin:10px 0;gap:3px}
.tab{flex:1;text-align:center;padding:9px 6px;border-radius:10px;font-size:14px;font-weight:700;color:var(--tx2);cursor:pointer}
.tab.active{background:var(--bg);color:var(--tx);border:1px solid var(--bd2)}
.panel{display:none}.panel.active{display:block}
.sel-label{font-size:15px;font-weight:700;margin-bottom:8px}

/* ── 農民曆 ── */
.lunar-detail{padding:10px 14px;border-radius:12px;background:#FFFBF0;border:1px solid #F0D080;margin-bottom:10px}
.lunar-main{font-size:14px;font-weight:700;color:#7A4F00;margin-bottom:4px}
.lunar-sub{font-size:12px;font-weight:500;color:#9A6B20;margin-bottom:5px}
.yi-ji{display:flex;gap:4px;flex-wrap:wrap}
.yi-tag,.ji-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.yi-tag{background:#E8F8F0;color:#0A6940;border:1px solid #9ED8BB}
.ji-tag{background:#FFF0F0;color:#A32D2D;border:1px solid #F0BBBB}
.hol-info{padding:8px 12px;background:#FCEBEB;border-radius:10px;margin-bottom:8px;font-size:13px;font-weight:600;color:#A32D2D}

/* ── 事件列表 ── */
.event-list{display:flex;flex-direction:column;gap:6px}
.event-item,.todo-item{border-radius:11px;background:var(--bg2);overflow:hidden}
.event-main,.todo-main{display:flex;align-items:center;gap:8px;padding:10px 12px}
.ev-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.ev-title-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ev-title{font-size:14px;font-weight:600}
.remind-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:#534AB7;background:#EEEDFE;border-radius:10px;padding:2px 7px;white-space:nowrap}
.remind-badge.now{color:#7C4A00;background:#FEF3C7;border:1px solid #FDE68A}
.repeat-badge{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:600;color:#0F6E56;background:#E1F5EE;border-radius:10px;padding:2px 7px;white-space:nowrap}
.time-badge{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:600;color:#374151;background:#F3F4F6;border-radius:10px;padding:2px 7px;white-space:nowrap;border:1px solid var(--bd)}
.ev-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ic-btn{background:none;border:1.5px solid var(--bd);border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:15px;flex-shrink:0}
.ic-btn.active-mode{background:#EEEDFE;border-color:#534AB7;color:#534AB7}
.ic-btn.bell.active-mode{background:#E1F5EE;border-color:#1D9E75;color:#1D9E75}
.ic-btn.del:active{background:#FCEBEB;color:#A32D2D}

/* ── sub bars ── */
.sub-bar{padding:0 12px 10px;display:flex;gap:6px;align-items:center}
.sub-bar input{flex:1;font-size:14px;font-weight:500;padding:8px 10px;border:1.5px solid #534AB7;border-radius:10px;background:var(--bg);color:var(--tx);outline:none}
.save-btn2{font-size:13px;font-weight:700;padding:8px 14px;border:none;border-radius:10px;background:#534AB7;color:#fff;cursor:pointer}
.cancel-btn2{font-size:13px;font-weight:600;padding:8px 12px;border:1.5px solid var(--bd);border-radius:10px;background:none;color:var(--tx2);cursor:pointer}

/* ── 提醒 popup ── */
.reminder-popup{padding:0 12px 10px}
.reminder-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:6px}
.rem-opt{font-size:12px;font-weight:600;padding:8px 2px;border:1.5px solid var(--bd);border-radius:10px;background:none;color:var(--tx2);cursor:pointer;text-align:center;line-height:1.3}
.rem-opt:active,.rem-opt.active{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56}
.rem-opt.now-style:active,.rem-opt.now-style.active{background:#FEF3C7;border-color:#F59E0B;color:#7C4A00}
.custom-remind-row{display:flex;gap:5px;align-items:center;margin-top:4px}
.custom-remind-row input{width:58px;font-size:13px;font-weight:600;padding:7px 8px;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--tx);outline:none}
.custom-remind-row input:focus{border-color:#1D9E75}
.custom-remind-row select{flex:1;font-size:13px;font-weight:500;padding:7px 6px;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg);color:var(--tx);outline:none;cursor:pointer}
.set-rem-btn{font-size:13px;font-weight:700;padding:7px 14px;border:none;border-radius:10px;background:#1D9E75;color:#fff;cursor:pointer;white-space:nowrap}
.set-rem-btn.orange{background:#F59E0B}

/* ── 待辦 ── */
.todo-cb{width:22px;height:22px;border:2px solid var(--bd);border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:13px}
.todo-cb.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.todo-text{flex:1;font-size:14px;font-weight:600;min-width:0}
.todo-text.done{text-decoration:line-through;color:var(--tx3)}
.empty-msg{font-size:13px;font-weight:500;color:var(--tx3);padding:16px 0;text-align:center}
.add-bar{display:flex;gap:6px;margin-top:10px}
.add-bar input{flex:1;font-size:14px;font-weight:500;padding:10px 12px;border:1.5px solid var(--bd);border-radius:12px;background:var(--bg);color:var(--tx);outline:none}
.add-bar input:focus{border-color:#534AB7}
.add-bar .abtn{width:40px;height:40px;border-radius:12px;border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#534AB7}
.add-bar .abtn.green{background:#1D9E75}
.add-bar .abtn:active{filter:brightness(.9);transform:scale(.95)}

/* ── 清單 ── */
.list-toggle{display:flex;background:var(--bg2);border-radius:12px;padding:3px;margin-bottom:12px;gap:3px}
.lt-btn{flex:1;text-align:center;padding:9px 6px;border-radius:10px;font-size:14px;font-weight:700;color:var(--tx2);cursor:pointer;border:none;background:none}
.lt-btn.active{background:var(--bg);color:var(--tx);border:1px solid var(--bd2)}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.list-title{font-size:15px;font-weight:700}
.list-count{font-size:12px;font-weight:600;color:var(--tx3);background:var(--bg2);padding:3px 10px;border-radius:20px}
.list-group{margin-bottom:12px}
.list-date-label{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.list-date-text{font-size:13px;font-weight:700;color:var(--tx2)}
.list-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px}
.list-badge.hol{color:#A32D2D;background:#FFF0F0}
.list-badge.tod{color:#1D4ED8;background:#EFF6FF}
.list-evt{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:11px;background:var(--bg2);margin-bottom:4px;cursor:pointer}
.list-evt:active{background:var(--bd)}
.list-evt-dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.list-evt-text{font-size:13px;font-weight:600;flex:1}
.list-evt-remind{font-size:11px;font-weight:600;color:#534AB7;background:#EEEDFE;padding:2px 7px;border-radius:10px;white-space:nowrap}
.list-evt-arrow{font-size:14px;color:var(--tx3);flex-shrink:0}
.list-todo{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:11px;background:var(--bg2);margin-bottom:4px}
.list-todo-cb{width:20px;height:20px;border:2px solid var(--bd);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;background:var(--bg)}
.list-todo-cb.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.list-todo-text{font-size:13px;font-weight:600;flex:1}
.list-todo-text.done{text-decoration:line-through;color:var(--tx3)}
.list-todo-remind{font-size:11px;font-weight:600;color:#7C4A00;background:#FEF3C7;border:1px solid #FDE68A;padding:2px 7px;border-radius:10px;white-space:nowrap}
.list-empty{text-align:center;padding:24px 0;font-size:13px;font-weight:500;color:var(--tx3)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div id="install-banner">
    <span style="flex:1">📱 加到主畫面，享受 App 體驗！</span>
    <button id="install-btn">安裝</button>
    <button id="install-dismiss">✕</button>
  </div>

  <div class="top-bar">
    <button class="nav-btn" id="prev">‹</button>
    <span class="month-title" id="month-label"></span>
    <button class="nav-btn" id="next">›</button>
    <div class="spacer"></div>
    <button class="top-btn" id="today-btn">今天</button>
    <button class="top-btn" id="jump-btn">查詢 ▾</button>
    <button class="top-btn" id="list-btn">清單</button>
  </div>

  <div id="jump-popup" style="display:none">
    <div class="jump-popup">
      <div class="jump-row">
        <input type="number" class="jump-year-input" id="jump-year-inp" min="1" max="9999"/>
        <select id="jump-month">
          <option value="0">1月</option><option value="1">2月</option><option value="2">3月</option>
          <option value="3">4月</option><option value="4">5月</option><option value="5">6月</option>
          <option value="6">7月</option><option value="7">8月</option><option value="8">9月</option>
          <option value="9">10月</option><option value="10">11月</option><option value="11">12月</option>
        </select>
        <button class="jump-go" id="jump-go">前往</button>
        <button class="jump-cancel" id="jump-cancel">取消</button>
      </div>
      <div class="jump-shortcuts">
        <span>快捷：</span>
        <button class="yr-chip" data-y="-50">-50年</button>
        <button class="yr-chip" data-y="-10">-10年</button>
        <button class="yr-chip" data-y="-1">去年</button>
        <button class="yr-chip" data-y="0">今年</button>
        <button class="yr-chip" data-y="1">明年</button>
        <button class="yr-chip" data-y="10">+10年</button>
        <button class="yr-chip" data-y="50">+50年</button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <button class="notif-pill" id="notif-btn">🔔 <span id="notif-label">開啟通知</span></button>
    <button class="tb-btn" id="update-hol-btn">↻ 更新節日</button>
    <button class="tb-btn sync" id="sync-btn">⇅ 備份/還原</button>
    <span class="save-toast" id="save-toast">✓ 已儲存</span>
  </div>

  <!-- 節日更新結果 -->
  <div id="hol-result-box" style="display:none">
    <div class="hol-result">
      <div class="hol-result-title" id="hol-result-title"></div>
      <div class="hol-result-body" id="hol-result-body"></div>
      <button class="hol-result-close" id="hol-result-close">確認</button>
    </div>
  </div>

  <!-- 備份/還原 -->
  <div id="sync-box" style="display:none">
    <div class="sync-box">
      <div class="sync-box-title">⇅ 資料備份 / 跨裝置同步</div>
      <div class="sync-box-body">匯出 JSON 後，在另一台裝置匯入即可手動同步。<br>自動同步需部署到網路並串接 Firebase 等雲端資料庫。</div>
      <div class="sync-actions">
        <button onclick="exportData()" style="background:#F59E0B;border:none;color:#fff">📤 匯出資料</button>
        <button onclick="document.getElementById('import-input').click()" style="background:none;border:1.5px solid #D97706;color:#92400E">📥 匯入資料</button>
        <button onclick="document.getElementById('sync-box').style.display='none'" style="background:none;border:1.5px solid var(--bd);color:var(--tx2)">關閉</button>
      </div>
      <input type="file" id="import-input" accept=".json" style="display:none"/>
    </div>
  </div>

  <div id="cal-section">
    <div class="weekdays">
      <div class="wd">一</div><div class="wd">二</div><div class="wd">三</div>
      <div class="wd">四</div><div class="wd">五</div><div class="wd sat">六</div><div class="wd sun">日</div>
    </div>
    <div class="days" id="days-grid"></div>
    <div class="tab-bar">
      <div class="tab active" data-tab="events">📅 事件</div>
      <div class="tab" data-tab="todos">✅ 待辦</div>
    </div>
    <div class="panel active" id="panel-events">
      <div class="sel-label" id="sel-label">請點選日期</div>
      <div id="hol-box"></div><div id="lunar-box"></div>
      <div class="event-list" id="event-list"></div>
      <div class="add-bar">
        <input type="text" id="evt-input" placeholder="事件名稱（可加時間，如：開會 14:00）"/>
        <button class="abtn" id="add-evt-btn">+</button>
      </div>
    </div>
    <div class="panel" id="panel-todos">
      <div class="event-list" id="todo-list"></div>
      <div class="add-bar" style="margin-top:10px">
        <input type="text" id="todo-input" placeholder="新增待辦事項…"/>
        <button class="abtn green" id="add-todo-btn">+</button>
      </div>
    </div>
  </div>

  <div id="list-section" style="display:none">
    <div class="list-toggle">
      <button class="lt-btn active" id="lt-evt">📅 事件</button>
      <button class="lt-btn" id="lt-todo">✅ 待辦</button>
    </div>
    <div class="list-header">
      <span class="list-title" id="list-title"></span>
      <span class="list-count" id="list-count"></span>
    </div>
    <div id="month-list"></div>
  </div>
</div>

<script>
const today=new Date();
let curYear=today.getFullYear(),curMonth=today.getMonth();
let selectedDate=null,holidayData={},localEvents={},todos=[],nextId=1;
let notifPermission='default',scheduledNotifs={};
let expandedEvt=null,expandedTodo=null,showingList=false,listMode='events';

const dKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const yyyymmdd=d=>`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;

function showToast(){const t=document.getElementById('save-toast');t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1500)}
function saveEvents(){try{localStorage.setItem('cal_events',JSON.stringify(localEvents));showToast()}catch(e){}}
function saveTodos(){try{localStorage.setItem('cal_todos',JSON.stringify(todos));showToast()}catch(e){}}
function loadStorage(){
  try{const r=localStorage.getItem('cal_events');if(r)localEvents=JSON.parse(r)}catch(e){}
  try{const r=localStorage.getItem('cal_todos');if(r){todos=JSON.parse(r);nextId=todos.reduce((m,t)=>Math.max(m,t.id),0)+1}}catch(e){}
  // 無預設待辦，從空白開始
}

function exportData(){
  const data={events:localEvents,todos,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`行事曆備份_${yyyymmdd(today)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
document.getElementById('import-input').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.events)localEvents=data.events;
      if(data.todos){todos=data.todos;nextId=todos.reduce((m,t)=>Math.max(m,t.id),0)+1}
      saveEvents();saveTodos();renderCalendar();renderEventPanel();renderTodos();renderMonthList();
      alert('✅ 資料匯入成功！');
    }catch(err){alert('❌ 匯入失敗，請確認檔案格式正確。')}
  };reader.readAsText(file);e.target.value='';
});

// ── 節日（含結果視窗）────────────────────────────────
async function loadHolidays(year,silent=false){
  const btn=document.getElementById('update-hol-btn');
  btn.textContent='↻ 載入中…';btn.disabled=true;
  const beforeCount=Object.keys(holidayData).length;
  let success=false,newCount=0;
  try{
    const r=await fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${year}.json`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    data.forEach(item=>{if(item.isHoliday&&item.description)holidayData[item.date]=item.description});
    newCount=Object.keys(holidayData).length;
    success=true;
  }catch(e){success=false}
  btn.textContent='↻ 更新節日';btn.disabled=false;
  renderCalendar();
  if(!silent){
    const box=document.getElementById('hol-result-box');
    const title=document.getElementById('hol-result-title');
    const body=document.getElementById('hol-result-body');
    if(success){
      title.innerHTML='✅ 節日資料更新成功';
      body.innerHTML=`已載入 <b>${year} 年</b> 台灣國定假日與節日資料。<br>共收錄 <b>${newCount} 個</b>假日與補班補假日期，<br>包含農曆節日（春節、端午、中秋等）及國定假日調整。`;
    }else{
      title.innerHTML='⚠️ 更新失敗';
      body.innerHTML=`無法從網路取得 ${year} 年節日資料。<br>請確認網路連線後再試一次。<br>行事曆仍可正常使用，僅節日標示可能不完整。`;
    }
    box.style.display='block';
  }
}
document.getElementById('hol-result-close').addEventListener('click',()=>{document.getElementById('hol-result-box').style.display='none'});

// ── 農民曆 ─────────────────────────────────────────────
function getLunar(date){
  try{const l=Lunar.fromDate(date);
    return{month:l.getMonthInChinese(),day:l.getDayInChinese(),jieqi:l.getJieQi()||'',
      gz:l.getYearInGanZhi?`${l.getYearInGanZhi()}年 ${l.getMonthInGanZhi()}月 ${l.getDayInGanZhi()}日`:'',sx:l.getYearShengXiao?l.getYearShengXiao():''}
  }catch(e){return{month:'',day:'',jieqi:'',gz:'',sx:''}}
}
const YI=['祭祀','出行','嫁娶','搬家','開業','會友','求財','動土','納畜','造屋'];
const JI=['殺伐','安葬','行喪','破土','開倉','出貨','移徙','動土'];

// ── 重複事件輔助 ───────────────────────────────────────
function parseDKey(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}

function getEventsForDate(date){
  const dk=dKey(date);
  const direct=(localEvents[dk]||[]).map(ev=>({...ev,_dk:dk,_recurring:false}));
  const recurring=[];
  Object.entries(localEvents).forEach(([storedDk,evts])=>{
    if(storedDk===dk)return;
    const orig=parseDKey(storedDk);
    evts.forEach(ev=>{
      if(!ev.repeat)return;
      const sameDay=orig.getDate()===date.getDate();
      const sameMonthDay=orig.getMonth()===date.getMonth()&&orig.getDate()===date.getDate();
      if(ev.repeat==='monthly'&&sameDay&&date>orig){
        recurring.push({...ev,_dk:storedDk,_recurring:true});
      }else if(ev.repeat==='yearly'&&sameMonthDay&&date.getFullYear()>orig.getFullYear()){
        recurring.push({...ev,_dk:storedDk,_recurring:true});
      }
    });
  });
  return[...direct,...recurring];
}

// ── 行事曆 ─────────────────────────────────────────────
function renderCalendar(){
  document.getElementById('month-label').textContent=`${curYear}年${curMonth+1}月`;
  const grid=document.getElementById('days-grid');grid.innerHTML='';
  const first=new Date(curYear,curMonth,1),offset=(first.getDay()+6)%7;
  const dim=new Date(curYear,curMonth+1,0).getDate(),prev=new Date(curYear,curMonth,0).getDate();
  for(let i=offset-1;i>=0;i--)addDay(grid,new Date(curYear,curMonth-1,prev-i),true);
  for(let d=1;d<=dim;d++)addDay(grid,new Date(curYear,curMonth,d),false);
  const total=offset+dim,rem=total%7===0?0:7-total%7;
  for(let d=1;d<=rem;d++)addDay(grid,new Date(curYear,curMonth+1,d),true);
}
function addDay(grid,date,other){
  const key=yyyymmdd(date),dk=dKey(date),dow=date.getDay();
  const isHol=!!holidayData[key],isToday=date.toDateString()===today.toDateString();
  const isSel=selectedDate&&date.toDateString()===selectedDate.toDateString();
  const lu=other?null:getLunar(date),hasEvt=!other&&getEventsForDate(date).length>0;
  const div=document.createElement('div');
  let cls='day';
  if(other)cls+=' other-month';
  if(!other){if(dow===6)cls+=' sat';if(dow===0)cls+=' sun';if(isHol)cls+=' holiday';if(hasEvt)cls+=' has-evt'}
  if(isToday)cls+=' today';if(isSel)cls+=' selected';
  div.className=cls;
  if(hasEvt){const dot=document.createElement('div');dot.className='ev-indicator'+(isHol?' holiday-day':'')+(isSel?' selected-day':'');div.appendChild(dot)}
  const num=document.createElement('div');num.className='day-num';num.textContent=date.getDate();div.appendChild(num);
  if(!other&&lu){
    if(lu.jieqi){const st=document.createElement('div');st.className='solar-term';st.textContent=lu.jieqi;div.appendChild(st);const lt=document.createElement('div');lt.className='lunar-txt';lt.textContent=`${lu.month}月${lu.day}`;div.appendChild(lt)}
    else{const lt=document.createElement('div');lt.className='lunar-txt';lt.textContent=lu.day==='初一'?lu.month+'月':lu.day;div.appendChild(lt)}
    if(isHol){const hn=document.createElement('div');hn.className='hol-name';const n=holidayData[key];hn.textContent=n.length>4?n.slice(0,4)+'…':n;div.appendChild(hn)}
  }
  if(!other)div.addEventListener('click',()=>{selectedDate=date;expandedEvt=null;if(showingList)toggleList(false);switchTab('events');renderCalendar();renderEventPanel()});
  grid.appendChild(div);
}

// ── 提醒 popup ─────────────────────────────────────────
function buildRemindPopup({presets,activeLabel,nowMode=false,onPreset}){
  const pop=document.createElement('div');pop.className='reminder-popup';
  const grid=document.createElement('div');grid.className='reminder-grid';
  presets.forEach(p=>{
    const btn=document.createElement('button');
    const isActive=p.key==='none'?(!activeLabel):activeLabel===p.label;
    btn.className='rem-opt'+(nowMode?' now-style':'')+(isActive?' active':'');
    btn.textContent=p.label;
    btn.addEventListener('click',()=>{
      if(p.key==='cu'){const cr=pop.querySelector('.custom-remind-row');cr.style.display=cr.style.display==='none'?'flex':'none';return}
      onPreset(p.mins,p.label);
    });
    grid.appendChild(btn);
  });
  pop.appendChild(grid);
  const cr=document.createElement('div');cr.className='custom-remind-row';cr.style.display='none';
  const numInp=document.createElement('input');numInp.type='number';numInp.min='1';numInp.value='1';
  const unitSel=document.createElement('select');
  const units=nowMode?[['m','分鐘後'],['h','小時後'],['d','天後']]:[['d','天前'],['w','週前'],['mo','月前']];
  units.forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;unitSel.appendChild(o)});
  const setBtn=document.createElement('button');setBtn.className='set-rem-btn'+(nowMode?' orange':'');setBtn.textContent='設定';
  setBtn.addEventListener('click',()=>{
    const val=parseInt(numInp.value)||1,unit=unitSel.value;
    const minsMap={m:val,h:val*60,d:val*60*24,w:val*60*24*7,mo:val*60*24*30};
    const labelMap={m:`${val}分鐘`,h:`${val}小時`,d:`${val}天`,w:`${val}週`,mo:`${val}個月`};
    onPreset(minsMap[unit],labelMap[unit]+(nowMode?'後':'前'));
  });
  cr.appendChild(numInp);cr.appendChild(unitSel);cr.appendChild(setBtn);
  pop.appendChild(cr);
  return pop;
}
function setEvtReminder(ev,dk,minsBefore,label,date){
  if(notifPermission!=='granted'){alert('請先開啟通知提醒權限');return false}
  const[h,m]=(ev.time||'00:00').split(':').map(Number);
  const base=new Date(date);base.setHours(h,m,0,0);
  const ms=base-Date.now()-minsBefore*60000,nkey=`evt-${dk}-${ev.title}`;
  if(scheduledNotifs[nkey])clearTimeout(scheduledNotifs[nkey]);
  const body=ev.time?`${ev.time} ${ev.title}`:ev.title;
  if(ms<=0)new Notification('行事曆提醒',{body});
  else scheduledNotifs[nkey]=setTimeout(()=>{new Notification('行事曆提醒',{body});delete scheduledNotifs[nkey]},ms);
  ev.remindLabel=label;return true;
}
function setTodoReminder(t,minsFromNow,label){
  if(notifPermission!=='granted'){alert('請先開啟通知提醒權限');return false}
  const nkey=`todo-${t.id}`;
  if(scheduledNotifs[nkey])clearTimeout(scheduledNotifs[nkey]);
  scheduledNotifs[nkey]=setTimeout(()=>{new Notification('待辦提醒',{body:t.text});delete scheduledNotifs[nkey]},minsFromNow*60000);
  t.remindLabel=label;return true;
}

// ── 事件面板 ──────────────────────────────────────────
function renderEventPanel(){
  const lbl=document.getElementById('sel-label'),holBox=document.getElementById('hol-box'),lunarBox=document.getElementById('lunar-box'),list=document.getElementById('event-list');
  if(!selectedDate){lbl.textContent='請點選日期';holBox.innerHTML='';lunarBox.innerHTML='';list.innerHTML='';return}
  const key=yyyymmdd(selectedDate),dk=dKey(selectedDate);
  lbl.textContent=`${selectedDate.getMonth()+1} 月 ${selectedDate.getDate()} 日`;
  holBox.innerHTML=holidayData[key]?`<div class="hol-info">🎉 ${holidayData[key]}</div>`:'';
  const lu=getLunar(selectedDate);
  if(lu.month){const seed=(selectedDate.getDate()+selectedDate.getMonth()*3)%8;
    lunarBox.innerHTML=`<div class="lunar-detail"><div class="lunar-main">農曆 ${lu.month}月${lu.day}${lu.jieqi?` · <span style="color:#1D9E75">${lu.jieqi}</span>`:''}</div><div class="lunar-sub">${lu.gz} ${lu.sx?'· '+lu.sx+'年':''}</div><div class="yi-ji">${YI.slice(seed,seed+3).map(y=>`<span class="yi-tag">宜 ${y}</span>`).join('')}${JI.slice(seed%4,seed%4+2).map(j=>`<span class="ji-tag">忌 ${j}</span>`).join('')}</div></div>`}
  else lunarBox.innerHTML='';
  list.innerHTML='';
  const allEvts=getEventsForDate(selectedDate);
  if(!allEvts.length){list.innerHTML='<div class="empty-msg">這天沒有事件</div>';return}
  allEvts.forEach((ev,i)=>{
    const dk=ev._dk;
    const isRecurring=ev._recurring;
    // index within the original stored array
    const origEvts=localEvents[dk]||[];
    const origIdx=origEvts.findIndex(e=>e.title===ev.title&&e.repeat===ev.repeat);
    const isExp=expandedEvt&&expandedEvt.dk===dk&&expandedEvt.idx===origIdx;
    const mode=isExp?expandedEvt.mode:null;
    const item=document.createElement('div');item.className='event-item';
    const main=document.createElement('div');main.className='event-main';
    const remBadge=ev.remindLabel?`<span class="remind-badge">🔔 ${ev.remindLabel}</span>`:'';
    const repBadge=ev.repeat?`<span class="repeat-badge">${ev.repeat==='monthly'?'🔁每月':'🔁每年'}</span>`:'';
    const timeBadge=ev.time?`<span class="time-badge">🕐 ${ev.time}</span>`:'';
    main.innerHTML=`<div class="ev-dot"></div><div class="ev-title-wrap"><span class="ev-title">${ev.title}</span>${timeBadge}${repBadge}${remBadge}</div>
      <div class="ev-actions">
        <button class="ic-btn edit${mode==='edit'?' active-mode':''}">✏️</button>
        <button class="ic-btn bell${mode==='remind'?' active-mode':''}">🔔</button>
        <button class="ic-btn repeat${mode==='repeat'?' active-mode':''}">🔁</button>
        <button class="ic-btn del${mode==='confirm-del'?' active-mode':''}">×</button>
      </div>`;
    item.appendChild(main);
    if(mode==='edit'){
      const bar=document.createElement('div');bar.className='sub-bar';bar.style.flexWrap='wrap';
      bar.innerHTML=`<input type="text" class="edit-title-inp" placeholder="事件名稱" style="flex:1;min-width:120px"/><input type="time" class="edit-time-inp" style="width:110px;font-size:13px;padding:5px 8px;border:1.5px solid #534AB7;border-radius:10px;background:var(--bg);color:var(--tx);outline:none"/><button class="cancel-btn2">取消</button><button class="save-btn2">儲存</button>`;
      item.appendChild(bar);
      setTimeout(()=>{
        const ti=bar.querySelector('.edit-title-inp');const tm=bar.querySelector('.edit-time-inp');
        if(ti){ti.value=ev.title;ti.focus();}
        if(tm&&ev.time)tm.value=ev.time;
      },0);
      bar.querySelector('.save-btn2').addEventListener('click',()=>{
        const v=bar.querySelector('.edit-title-inp').value.trim();if(!v)return;
        const t=bar.querySelector('.edit-time-inp').value;
        if(origIdx>=0)origEvts[origIdx]={...origEvts[origIdx],title:v,time:t||undefined};
        localEvents[dk]=origEvts;expandedEvt=null;saveEvents();renderEventPanel();renderCalendar();
      });
      bar.querySelector('.cancel-btn2').addEventListener('click',()=>{expandedEvt=null;renderEventPanel()});
    }
    if(mode==='remind'){
      item.appendChild(buildRemindPopup({
        presets:[{key:'none',label:'不提醒',mins:null},{key:'1d',label:'1天前',mins:60*24},{key:'3d',label:'3天前',mins:60*24*3},{key:'cu',label:'自訂'}],
        activeLabel:ev.remindLabel,nowMode:false,
        onPreset:(mins,label)=>{
          if(mins===null){
            // 清除提醒
            if(origIdx>=0){
              origEvts[origIdx].remindLabel=undefined;
              const nkey=`evt-${dk}-${origEvts[origIdx].title}`;
              if(scheduledNotifs[nkey]){clearTimeout(scheduledNotifs[nkey]);delete scheduledNotifs[nkey]}
            }
            localEvents[dk]=origEvts;saveEvents();expandedEvt=null;renderEventPanel();renderMonthList();
          }else{
            if(origIdx>=0&&setEvtReminder(origEvts[origIdx],dk,mins,label,selectedDate)){localEvents[dk]=origEvts;saveEvents();expandedEvt=null;renderEventPanel();renderMonthList()}
          }
        }
      }));
    }
    if(mode==='repeat'){
      const pop=document.createElement('div');pop.className='reminder-popup';
      const opts=[{key:'',label:'不重複'},{key:'monthly',label:'🔁 每月同一天'},{key:'yearly',label:'🔁 每年同一天'}];
      const g=document.createElement('div');g.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 0 8px';
      opts.forEach(o=>{
        const btn=document.createElement('button');
        btn.className='rem-opt'+(ev.repeat===(o.key||undefined)?o.key===''?(!ev.repeat?' active':''):' active':'');
        btn.textContent=o.label;btn.style.fontSize='12px';
        btn.addEventListener('click',()=>{
          if(origIdx>=0){origEvts[origIdx]={...origEvts[origIdx],repeat:o.key||undefined};localEvents[dk]=origEvts;}
          expandedEvt=null;saveEvents();renderEventPanel();renderCalendar();
        });
        g.appendChild(btn);
      });
      pop.appendChild(g);
      if(ev.repeat){
        const note=document.createElement('div');
        note.style.cssText='font-size:11px;color:var(--tx2);padding:0 0 6px;line-height:1.5';
        note.textContent=ev.repeat==='monthly'
          ?`每月 ${parseDKey(dk).getDate()} 號自動顯示`
          :`每年 ${parseDKey(dk).getMonth()+1}/${parseDKey(dk).getDate()} 自動顯示`;
        pop.appendChild(note);
      }
      item.appendChild(pop);
    }
    if(mode==='confirm-del'){
      const bar=document.createElement('div');bar.className='sub-bar';bar.style.cssText='padding:0 12px 10px;gap:8px;align-items:center';
      bar.innerHTML=`<span style="font-size:13px;font-weight:600;color:var(--tx);flex:1">確定要刪除此事件？</span><button class="cancel-btn2">取消</button><button class="save-btn2" style="background:#E24B4A">刪除</button>`;
      item.appendChild(bar);
      bar.querySelector('.cancel-btn2').addEventListener('click',()=>{expandedEvt=null;renderEventPanel()});
      bar.querySelector('.save-btn2').addEventListener('click',()=>{
        if(origIdx>=0)origEvts.splice(origIdx,1);
        localEvents[dk]=origEvts;expandedEvt=null;saveEvents();renderEventPanel();renderMonthList();renderCalendar();
      });
    }
    main.querySelector('.ic-btn.edit').addEventListener('click',()=>{expandedEvt=(isExp&&mode==='edit')?null:{dk,idx:origIdx,mode:'edit'};renderEventPanel()});
    main.querySelector('.ic-btn.bell').addEventListener('click',()=>{expandedEvt=(isExp&&mode==='remind')?null:{dk,idx:origIdx,mode:'remind'};renderEventPanel()});
    main.querySelector('.ic-btn.repeat').addEventListener('click',()=>{expandedEvt=(isExp&&mode==='repeat')?null:{dk,idx:origIdx,mode:'repeat'};renderEventPanel()});
    main.querySelector('.ic-btn.del').addEventListener('click',()=>{expandedEvt=(isExp&&mode==='confirm-del')?null:{dk,idx:origIdx,mode:'confirm-del'};renderEventPanel()});
    list.appendChild(item);
  });
}

// ── 待辦 ──────────────────────────────────────────────
function renderTodos(){
  const list=document.getElementById('todo-list');list.innerHTML='';
  if(!todos.length){list.innerHTML='<div class="empty-msg">沒有待辦事項</div>';return}
  todos.forEach(t=>{
    const isExp=expandedTodo&&expandedTodo.id===t.id,mode=isExp?expandedTodo.mode:null;
    const item=document.createElement('div');item.className='todo-item';
    const main=document.createElement('div');main.className='todo-main';
    const badge=t.remindLabel?`<span class="remind-badge now">⏰ ${t.remindLabel}</span>`:'';
    main.innerHTML=`<div class="todo-cb${t.done?' done':''}" data-id="${t.id}">${t.done?'✓':''}</div>
      <div class="ev-title-wrap"><span class="todo-text${t.done?' done':''}">${t.text}</span>${badge}</div>
      <div class="ev-actions">
        <button class="ic-btn edit${mode==='edit'?' active-mode':''}">✏️</button>
        <button class="ic-btn bell${mode==='remind'?' active-mode':''}">⏰</button>
        <button class="ic-btn del">×</button>
      </div>`;
    item.appendChild(main);
    if(mode==='edit'){
      const bar=document.createElement('div');bar.className='sub-bar';
      bar.innerHTML=`<input type="text" value="${t.text}"/><button class="cancel-btn2">取消</button><button class="save-btn2">儲存</button>`;
      item.appendChild(bar);
      setTimeout(()=>{const inp=bar.querySelector('input');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length)}},0);
      bar.querySelector('.save-btn2').addEventListener('click',()=>{const v=bar.querySelector('input').value.trim();if(!v)return;todos=todos.map(x=>x.id===t.id?{...x,text:v}:x);expandedTodo=null;saveTodos();renderTodos()});
      bar.querySelector('.cancel-btn2').addEventListener('click',()=>{expandedTodo=null;renderTodos()});
    }
    if(mode==='remind'){
      item.appendChild(buildRemindPopup({
        presets:[{key:'10m',label:'10分鐘後',mins:10},{key:'30m',label:'30分鐘後',mins:30},{key:'1h',label:'1小時後',mins:60},{key:'cu',label:'自訂'}],
        activeLabel:t.remindLabel,nowMode:true,
        onPreset:(mins,label)=>{const idx=todos.findIndex(x=>x.id===t.id);if(idx>=0&&setTodoReminder(todos[idx],mins,label)){expandedTodo=null;saveTodos();renderTodos();renderMonthList()}}
      }));
    }
    main.querySelector('.todo-cb').addEventListener('click',()=>{todos=todos.map(x=>x.id===t.id?{...x,done:!x.done}:x);saveTodos();renderTodos();renderMonthList()});
    main.querySelector('.ic-btn.edit').addEventListener('click',()=>{expandedTodo=(isExp&&mode==='edit')?null:{id:t.id,mode:'edit'};renderTodos()});
    main.querySelector('.ic-btn.bell').addEventListener('click',()=>{expandedTodo=(isExp&&mode==='remind')?null:{id:t.id,mode:'remind'};renderTodos()});
    main.querySelector('.ic-btn.del').addEventListener('click',()=>{todos=todos.filter(x=>x.id!==t.id);expandedTodo=null;saveTodos();renderTodos();renderMonthList()});
    list.appendChild(item);
  });
}

// ── 清單 ──────────────────────────────────────────────
function renderMonthList(){
  if(!showingList)return;
  const container=document.getElementById('month-list');container.innerHTML='';
  if(listMode==='events'){
    document.getElementById('list-title').textContent=`${curYear}年${curMonth+1}月 事件`;
    const dim=new Date(curYear,curMonth+1,0).getDate();let total=0;const groups=[];
    for(let d=1;d<=dim;d++){const date=new Date(curYear,curMonth,d);const evts=getEventsForDate(date);if(evts.length){total+=evts.length;groups.push({date,evts})}}
    document.getElementById('list-count').textContent=total?`共 ${total} 筆`:'無事件';
    if(!groups.length){container.innerHTML='<div class="list-empty">本月尚無事件</div>';return}
    const dayNames=['日','一','二','三','四','五','六'];
    groups.forEach(({date,evts})=>{
      const holKey=yyyymmdd(date),isToday=date.toDateString()===today.toDateString(),isHol=!!holidayData[holKey];
      const group=document.createElement('div');group.className='list-group';
      const dl=document.createElement('div');dl.className='list-date-label';
      dl.innerHTML=`<span class="list-date-text">${curMonth+1}/${date.getDate()}（${dayNames[date.getDay()]}）</span>${isToday?'<span class="list-badge tod">今天</span>':''}${isHol?`<span class="list-badge hol">${holidayData[holKey]}</span>`:''}`;
      group.appendChild(dl);
      evts.forEach(ev=>{
        const row=document.createElement('div');row.className='list-evt';
        const repTxt=ev.repeat?`<span style="font-size:10px;color:#0F6E56;background:#E1F5EE;padding:1px 5px;border-radius:8px;font-weight:600">${ev.repeat==='monthly'?'🔁每月':'🔁每年'}</span>`:'';
        row.innerHTML=`<div class="list-evt-dot${ev._recurring?' style="background:#1D9E75"':''}"></div><span class="list-evt-text">${ev.title}</span>${repTxt}${ev.remindLabel?`<span class="list-evt-remind">🔔 ${ev.remindLabel}</span>`:''}<span class="list-evt-arrow">›</span>`;
        row.addEventListener('click',()=>{selectedDate=date;expandedEvt=null;toggleList(false);switchTab('events');renderCalendar();renderEventPanel()});
        group.appendChild(row);
      });
      container.appendChild(group);
    });
  }else{
    document.getElementById('list-title').textContent='所有待辦';
    const pending=todos.filter(t=>!t.done),done=todos.filter(t=>t.done);
    document.getElementById('list-count').textContent=`${pending.length} 未完成 / ${done.length} 已完成`;
    if(!todos.length){container.innerHTML='<div class="list-empty">沒有待辦事項</div>';return}
    const renderRow=t=>{
      const row=document.createElement('div');row.className='list-todo';
      row.innerHTML=`<div class="list-todo-cb${t.done?' done':''}" data-id="${t.id}">${t.done?'✓':''}</div>
        <span class="list-todo-text${t.done?' done':''}">${t.text}</span>
        ${t.remindLabel?`<span class="list-todo-remind">⏰ ${t.remindLabel}</span>`:''}`;
      row.querySelector('.list-todo-cb').addEventListener('click',()=>{todos=todos.map(x=>x.id===t.id?{...x,done:!x.done}:x);saveTodos();renderMonthList()});
      container.appendChild(row);
    };
    if(pending.length){const hd=document.createElement('div');hd.className='list-date-label';hd.innerHTML='<span class="list-date-text">未完成</span>';container.appendChild(hd);pending.forEach(renderRow)}
    if(done.length){const hd=document.createElement('div');hd.className='list-date-label';hd.style.marginTop='10px';hd.innerHTML='<span class="list-date-text" style="color:var(--tx3)">已完成</span>';container.appendChild(hd);done.forEach(renderRow)}
  }
}
function setListMode(m){listMode=m;document.getElementById('lt-evt').classList.toggle('active',m==='events');document.getElementById('lt-todo').classList.toggle('active',m==='todos');renderMonthList()}
document.getElementById('lt-evt').addEventListener('click',()=>setListMode('events'));
document.getElementById('lt-todo').addEventListener('click',()=>setListMode('todos'));
function toggleList(force){showingList=force!==undefined?force:!showingList;document.getElementById('cal-section').style.display=showingList?'none':'block';document.getElementById('list-section').style.display=showingList?'block':'none';document.getElementById('list-btn').classList.toggle('list-active',showingList);if(showingList)renderMonthList()}
function switchTab(name){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));const tab=document.querySelector(`[data-tab="${name}"]`);if(tab)tab.classList.add('active');const panel=document.getElementById(`panel-${name}`);if(panel)panel.classList.add('active')}

// 查詢
const jyi=document.getElementById('jump-year-inp');jyi.value=today.getFullYear();
document.getElementById('jump-btn').addEventListener('click',()=>{const box=document.getElementById('jump-popup'),open=box.style.display==='none';box.style.display=open?'block':'none';document.getElementById('jump-btn').classList.toggle('active',open);if(open){jyi.value=curYear;document.getElementById('jump-month').value=curMonth}});
document.getElementById('jump-go').addEventListener('click',()=>{const y=parseInt(jyi.value);if(!y||y<1||y>9999){alert('請輸入有效年份');return}curYear=y;curMonth=parseInt(document.getElementById('jump-month').value);document.getElementById('jump-popup').style.display='none';document.getElementById('jump-btn').classList.remove('active');loadHolidays(curYear,true);renderCalendar();if(showingList)renderMonthList()});
document.getElementById('jump-cancel').addEventListener('click',()=>{document.getElementById('jump-popup').style.display='none';document.getElementById('jump-btn').classList.remove('active')});
document.querySelectorAll('.yr-chip').forEach(chip=>{chip.addEventListener('click',()=>{const o=parseInt(chip.dataset.y);jyi.value=o===0?today.getFullYear():(parseInt(jyi.value)||today.getFullYear())+o})});

// 通知
function updateNotifUI(){const btn=document.getElementById('notif-btn'),lbl=document.getElementById('notif-label');if(notifPermission==='granted'){btn.className='notif-pill on';lbl.textContent='通知已開啟'}else if(notifPermission==='denied'){btn.className='notif-pill off';lbl.textContent='通知被封鎖'}else{btn.className='notif-pill';lbl.textContent='開啟通知'}}
document.getElementById('notif-btn').addEventListener('click',async()=>{if(notifPermission==='denied'){alert('通知已被封鎖，請至瀏覽器設定手動允許。');return}if(!('Notification' in window)){alert('此環境不支援通知功能。');return}const p=await Notification.requestPermission();notifPermission=p;updateNotifUI();if(p==='granted')new Notification('✅ 通知已開啟',{body:'事件與待辦提醒將準時通知您'})});
document.getElementById('update-hol-btn').addEventListener('click',()=>{holidayData={};loadHolidays(curYear)});
document.getElementById('sync-btn').addEventListener('click',()=>{const b=document.getElementById('sync-box');b.style.display=b.style.display==='none'?'block':'none'});
document.getElementById('list-btn').addEventListener('click',()=>toggleList());
document.getElementById('prev').addEventListener('click',()=>{curMonth--;if(curMonth<0){curMonth=11;curYear--}loadHolidays(curYear,true);renderCalendar();if(showingList)renderMonthList()});
document.getElementById('next').addEventListener('click',()=>{curMonth++;if(curMonth>11){curMonth=0;curYear++}loadHolidays(curYear,true);renderCalendar();if(showingList)renderMonthList()});
document.getElementById('today-btn').addEventListener('click',()=>{curYear=today.getFullYear();curMonth=today.getMonth();selectedDate=today;expandedEvt=null;if(showingList)toggleList(false);renderCalendar();renderEventPanel()});
document.getElementById('add-evt-btn').addEventListener('click',()=>{if(!selectedDate){alert('請先點選日期');return}const inp=document.getElementById('evt-input'),val=inp.value.trim();if(!val)return;const dk=dKey(selectedDate);
  // 解析格式：「事件名稱 14:00」或「14:00 事件名稱」
  const m=val.match(/^(.+?)\s+(\d{1,2}:\d{2})$/)|| val.match(/^(\d{1,2}:\d{2})\s+(.+)$/);
  let entry;
  if(m){const isTimeFirst=/^\d{1,2}:\d{2}$/.test(m[1]);entry={title:isTimeFirst?m[2].trim():m[1].trim(),time:isTimeFirst?m[1]:m[2]};}
  else{entry={title:val};}
  localEvents[dk]=[...(localEvents[dk]||[]),entry];
  // 預設提醒：事件當天 00:00
  const newEvt=localEvents[dk][localEvents[dk].length-1];
  const base=new Date(selectedDate);base.setHours(0,0,0,0);
  const ms=base-Date.now();
  newEvt.remindLabel='當天 00:00';
  if(notifPermission==='granted'&&ms>0){
    const nkey=`evt-${dk}-${newEvt.title}`;
    scheduledNotifs[nkey]=setTimeout(()=>{new Notification('行事曆提醒',{body:newEvt.time?newEvt.time+' '+newEvt.title:newEvt.title});delete scheduledNotifs[nkey]},ms);
  }
  inp.value='';expandedEvt=null;saveEvents();renderEventPanel();renderCalendar()});
document.getElementById('evt-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-evt-btn').click()});
document.getElementById('add-todo-btn').addEventListener('click',()=>{const inp=document.getElementById('todo-input'),val=inp.value.trim();if(!val)return;todos.push({id:nextId++,text:val,done:false});inp.value='';saveTodos();renderTodos()});
document.getElementById('todo-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-todo-btn').click()});
document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>switchTab(tab.dataset.tab))});

// PWA
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').style.display='flex'});
document.getElementById('install-btn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').style.display='none'});
document.getElementById('install-dismiss').addEventListener('click',()=>{document.getElementById('install-banner').style.display='none'});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}

if('Notification' in window)notifPermission=Notification.permission;
updateNotifUI();
loadStorage();renderTodos();renderEventPanel();
loadHolidays(curYear,true);  // 首次載入靜默更新，不跳視窗
</script>
</body>
